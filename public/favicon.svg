<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <!-- gauge arc (270°, open at the bottom) -->
  <g transform="rotate(135 32 34)">
    <circle cx="32" cy="34" r="18" fill="none" stroke="#334155" stroke-width="6"
            stroke-linecap="round" stroke-dasharray="84.82 113.1"/>
    <circle cx="32" cy="34" r="18" fill="none" stroke="#f43f5e" stroke-width="6"
            stroke-linecap="round" stroke-dasharray="56.55 113.1"/>
  </g>
  <!-- needle -->
  <line x1="32" y1="34" x2="43" y2="23" stroke="#fda4af" stroke-width="4" stroke-linecap="round"/>
  <circle cx="32" cy="34" r="4.5" fill="#f43f5e"/>
</svg>
